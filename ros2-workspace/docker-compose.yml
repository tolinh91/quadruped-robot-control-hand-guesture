services:

  ros2:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: ros2_jazzy

    network_mode: host

    stdin_open: true
    tty: true

    environment:
      - DISPLAY=host.docker.internal:0
      - QT_X11_NO_MITSHM=1

    volumes:
      - ./src:/root/ros2_ws/src

    working_dir: /root/ros2_ws